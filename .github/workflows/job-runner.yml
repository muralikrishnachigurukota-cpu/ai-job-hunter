name: AI Job Hunter Daily Run

on:
  schedule:
    - cron: '0 7 * * *'   # every day 7 AM UTC
  workflow_dispatch:

jobs:
  run-job-hunter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run script
        run: |
          python job_finder.py
